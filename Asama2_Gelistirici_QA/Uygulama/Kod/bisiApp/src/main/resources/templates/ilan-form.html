<!DOCTYPE html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${formBaslik}">İlan Formu</title>
    <style>
        body { margin: 0; font-family: Inter, Arial, sans-serif; background: #f3f5f7; color: #172026; }
        .kapsayici { max-width: 980px; margin: 0 auto; padding: 28px; }
        .panel { background: white; border-radius: 20px; padding: 28px; box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        .tam { grid-column: 1 / -1; }
        input, select, textarea, button { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #d6dde3; box-sizing: border-box; font: inherit; }
        textarea { min-height: 180px; resize: vertical; }
        button { background: #1d8f5a; color: white; border: 0; font-weight: 700; cursor: pointer; }
        .yardim { color: #637381; font-size: 14px; margin-top: 8px; }
        img { width: 100%; max-height: 280px; object-fit: cover; border-radius: 14px; margin-top: 10px; }
        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="kapsayici">
    <p><a th:href="@{/}" style="color:#1d8f5a;">Ana sayfaya dön</a></p>
    <section class="panel">
        <h1 th:text="${formBaslik}">İlan Formu</h1>
        <form th:action="${formAksiyon}" th:object="${ilan}" method="post" enctype="multipart/form-data">
            <div class="grid">
                <div class="tam">
                    <label>Başlık</label>
                    <input th:field="*{baslik}" placeholder="Örnek: Carraro 29 jant dağ bisikleti" required>
                </div>
                <div>
                    <label>Fiyat</label>
                    <input th:field="*{fiyat}" type="number" step="0.01" required>
                </div>
                <div>
                    <label>Kategori</label>
                    <select th:field="*{kategori}" required>
                        <option value="">Seciniz</option>
                        <option th:each="secenek : ${kategoriler}" th:value="${secenek}" th:text="${secenek}"></option>
                    </select>
                </div>
                <div>
                    <label>Marka</label>
                    <select th:field="*{marka}" required>
                        <option value="">Seciniz</option>
                        <option th:each="secenek : ${markalar}" th:value="${secenek}" th:text="${secenek}"></option>
                    </select>
                </div>
                <div>
                    <label>Renk</label>
                    <select th:field="*{renk}" required>
                        <option value="">Seciniz</option>
                        <option th:each="secenek : ${renkler}" th:value="${secenek}" th:text="${secenek}"></option>
                    </select>
                </div>
                <div>
                    <label>Model Yılı</label>
                    <input th:field="*{modelYili}" type="number" min="1980" max="2035" required>
                </div>
                <div>
                    <label>Vites Sayisi</label>
                    <input th:field="*{vitesSayisi}" type="number" min="1" max="36" required>
                </div>
                <div>
                    <label>Durum</label>
                    <select th:field="*{durum}" required>
                        <option value="">Seciniz</option>
                        <option th:each="secenek : ${durumlar}" th:value="${secenek}" th:text="${secenek}"></option>
                    </select>
                </div>
                <div class="tam">
                    <label>Açıklama</label>
                    <textarea th:field="*{aciklama}" placeholder="Bakım geçmişi, parça değişimi, jant boyu, kullanım durumu..." required></textarea>
                </div>
                <div class="tam">
                    <label>Görsel Dosyası</label>
                    <input type="file" name="resimDosyasi" accept="image/*">
                    <p class="yardim">Resim URL yerine bilgisayarınızdan dosya seçin.</p>
                    <img th:if="${ilan.resimUrl != null}" th:src="${ilan.resimUrl}" alt="Mevcut görsel">
                </div>
                <div class="tam">
                    <button type="submit">Kaydet</button>
                </div>
            </div>
        </form>
    </section>
</div>
</body>
</html>
